<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Page Content Exercise</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        section {
            background-color: #bdc3c7; 
            padding: 15px;
            border: 1px solid #999;
            max-width: 800px;
            margin: 0 auto;
        }
        article {
            background-color: #d1d5d8; 
            border: 1px solid #7f8c8d;
            margin-bottom: 15px;
            padding: 15px;
        }
        header {
            border: 1px dotted #666; 
            padding: 5px;
            margin-bottom: 10px;
            width: fit-content;
        }
        h2 {
            margin: 0;
            font-size: 1.5em;
        }
        .meta-data {
            font-style: italic;
            font-size: 0.9em;
            color: #555;
            margin-top: 5px;
        }
        p {
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <section>
        
        <article>
            <header>
                <h2>Just Another Day</h2>
                <div class="meta-data">Written by Christina on January 11th</div>
            </header>
            <p>This is my second blog entry, and I just wanted to check in on you</p>
        </article>

        <article>
            <header>
                <h2>My First Blog Entry</h2>
                <div class="meta-data">Written by Christina on January 10th</div>
            </header>
            <p>I'm so happy to write my first blog entry - yay!</p>
        </article>

    </section>

</body>
</html>
