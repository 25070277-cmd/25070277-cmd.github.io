<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Thực Hành 2 - Session 11 & 12</title>
    <script language="javascript">
        var txta = prompt("Enter any integer");

        // Kiểm tra nếu không nhập hoặc nhập sai định dạng số
        if (txta == null || txta == "" || isNaN(txta)) {
            document.write("<font color='red'>You must enter a number</font>");
        } 
        // Kiểm tra số chẵn (chia hết cho 2)
        else if (parseFloat(txta) % 2 == 0) {
            document.write("<font color='green'><b>" + txta + " is an even number</b></font>");
        } 
        // Trường hợp còn lại là số lẻ
        else {
            document.write("<font color='blue'><i>" + txta + " is an odd number</i></font>");
        }
    </script>
</head>
<body>
    </body>
</html>
